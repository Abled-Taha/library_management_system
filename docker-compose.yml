services:
  # Main Database for Library Logic
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-library_db}
    ports:
      - "5432:5432" # Host:Container mapping for Dev access
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Logto Auth Service
  logto:
    image: svhd/logto:latest
    ports:
      - "3001:3001"
      - "3002:3002"
    environment:
      - DB_URL=postgres://logto:logto_password@logto-db:5432/logto
      - ENDPOINT=${LOGTO_ENDPOINT:-http://localhost:3001}
    depends_on:
      - logto-db

  logto-db:
    image: postgres:16
    environment:
      POSTGRES_USER: logto
      POSTGRES_PASSWORD: logto_password
      POSTGRES_DB: logto
    ports:
      - "5433:5432"

volumes:
  postgres_data: